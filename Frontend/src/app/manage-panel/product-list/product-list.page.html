<ion-content [fullscreen]="true">

  <!------------------------------------------------------------------------------------------------
  BARRA DE BUSQUEDA Y BOTON DE AGREGAR EN LA PARTE SUPERIOR DE LA VENTANA
  -------------------------------------------------------------------------------------------------->
  <div class="searchtab">

    <!------------------------------------------------------------------------------------------------
    FILTROS DE CATEGORIAS REALIZADO CON SEGMENTOS DE IONIC PARA HACER UNA BUSQUEDA MAS RAPIDA DE LAS 
    CATEGORIAS DE LOS PRODUCTOS
    -------------------------------------------------------------------------------------------------->
    <div class="segmentFilter">
      <ion-segment *ngFor="let category of selectedCategory" value="todos">
        <ion-segment-button value="{{ category.valor }}">
          <ion-label>{{ category.nombre }}</ion-label>
        </ion-segment-button>
      </ion-segment>
    </div>

    <!------------------------------------------------------------------------------------------------
    BARRA DE BUSQUEDA Y BOTON DE AGREGAR
    -------------------------------------------------------------------------------------------------->
    <div class="search-container">
      <ion-button (click)="goToAdminHome()">
        <ion-icon name="arrow-back"></ion-icon>
      </ion-button>
      <ion-searchbar placeholder="Código, Nombre o Categoría ...."></ion-searchbar>
      <ion-button (click)="openModal()">
        <ion-icon name="add"></ion-icon>
        Nuevo Producto
      </ion-button>
    </div>
  </div>

  <!------------------------------------------------------------------------------------------------
  MODAL PARA AGREGAR UN NUEVO PRODUCTO Y EDITAR PRODUCTO
  -------------------------------------------------------------------------------------------------->
  <ion-modal [isOpen]="isModalOpen" (didDismiss)="closeModal()" class="modalinput">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>Nuevo Producto</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="closeModal()">
              <ion-icon name="close"></ion-icon>
            </ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>

      <!------------------------------------------------------------------------------------------------
      FORMULARIO PARA AGREGAR UN NUEVO PRODUCTO
      -------------------------------------------------------------------------------------------------->
      <ion-content>
        <ion-item lines="none">
          <ion-label position="stacked">Codigo Producto</ion-label>
          <ion-input type="text" placeholder="Codigo del producto"></ion-input>
        </ion-item>
        <ion-item lines="none">
          <ion-label position="stacked">Nombre Producto</ion-label>
          <ion-input type="text" placeholder="Nombre del producto"></ion-input>
        </ion-item>
        <ion-item lines="none">
          <ion-label position="stacked">Categoria Producto</ion-label>
          <ion-input type="text" placeholder="Categoria del producto"></ion-input>
        </ion-item>
        <ion-item lines="none">
          <ion-label position="stacked">Stock Producto</ion-label>
          <ion-input type="number" placeholder="Stock del producto"></ion-input>
        </ion-item>
        <ion-item lines="none">
          <ion-label position="stacked">Precio Producto</ion-label>
          <ion-input type="number" placeholder="Precio del producto"></ion-input>
        </ion-item>
        <ion-item lines="none">
          <ion-label position="stacked">Imagen Producto</ion-label>
          <ion-input type="file" placeholder="Imagen del producto"></ion-input>
        </ion-item>

        <!------------------------------------------------------------------------------------------------
        BOTON PARA AGREGAR UN NUEVO PRODUCTO
        -------------------------------------------------------------------------------------------------->
        <ion-button expand="block" class="ion-margin">
          <ion-icon name="add" slot="start"></ion-icon>
          Agregar Producto
        </ion-button>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-content>
