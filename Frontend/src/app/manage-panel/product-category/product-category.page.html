<ion-content [fullscreen]="true">

  <!------------------------------------------------------------------------------------------------
  BARRA DE BUSQUEDA Y BOTON DE AGREGAR EN LA PARTE SUPERIOR DE LA VENTANA
  -------------------------------------------------------------------------------------------------->
  <div class="searchtab">
    <div class="search-container">
      <ion-button (click)="goToAdminHome()">
        <ion-icon name="arrow-back"></ion-icon>
      </ion-button>
      <ion-searchbar placeholder="Buscar Categoría ...."></ion-searchbar>
      <ion-button (click)="openModal()">
        <ion-icon name="add"></ion-icon>
        Nueva Categoría
      </ion-button>
    </div>
  </div>

  <!------------------------------------------------------------------------------------------------
  MODAL PARA AGREGAR NUEVA CATEGORIA
  -------------------------------------------------------------------------------------------------->
  <ion-modal [isOpen]="isModalOpen" (didDismiss)="closeModal()" class="modalinput">
    <!--TEMPLATE PARA EL MODAL-->
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-title>Nueva Categoría</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="closeModal()">
              <ion-icon name="close"></ion-icon>
            </ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <!--TEMPLATE PARA EL CONTENIDO DEL MODAL-->
      <ion-content>
        <ion-item lines="none">
          <ion-label position="stacked">Nueva Categoría</ion-label>
          <ion-input type="text" placeholder="Nombre de la categoría"></ion-input>
        </ion-item>
        <!--TEMPLATE PARA EL BOTON DE AGREGAR-->
        <ion-button expand="block" class="ion-margin">
          <ion-icon name="add" slot="start"></ion-icon>
          Agregar Categoría
        </ion-button>
      </ion-content>
    </ng-template>
  </ion-modal>


</ion-content>
