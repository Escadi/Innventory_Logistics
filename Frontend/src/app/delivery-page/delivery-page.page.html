<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Listado de pedidos</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content [fullscreen]="true">

  <!-- barra de busqueda -->
  <div class="search-container">
    <div class="search-bar">
      <ion-searchbar placeholder="CIF, Nombre, Email, Telefono,.........." [(ngModel)]="searchText"></ion-searchbar>
      <ion-buttons slot="end">
        <ion-button (click)="scanPedido()">
          <ion-icon slot="icon-only" name="qr-code-outline"></ion-icon>
        </ion-button>
      </ion-buttons>
      <ion-item lines="none">
        <ion-icon name="apps-outline"></ion-icon>
        <ion-toggle justify="end" [(ngModel)]="isChangeToogle">
        </ion-toggle>
        <ion-icon name="reorder-four-outline"></ion-icon>
      </ion-item>
    </div>
  </div>

  <!-- contenedor de los pedidos -->
  <div>
    <ion-grid *ngIf="!isChangeToogle" class="pedidos-grid-container">
      <ion-row>
        <ion-col size="11" size-md="5" size-lg="3" *ngFor="let pedido of pedidos">
          <ion-card class="pedido-card">
            <ion-card-header>
              <ion-chip>
                <ion-label>{{ pedido.estado }}</ion-label>
              </ion-chip>
              <div class="info-Pedido">
                <h2>
                  <ion-icon name="qr-code-outline"></ion-icon>{{ pedido.idPedido }}
                </h2>
                <p><ion-icon name="people-outline"></ion-icon>{{ pedido.cliente.nombre }}</p>
                <p><ion-icon name="send-outline"></ion-icon>{{ pedido.centroTrabajo.nombreCentro }}</p>
              </div>
            </ion-card-header>
            <ion-card-content>
              <div class="info-trabajador">
                <h2><ion-icon name="person-outline"></ion-icon>{{ pedido.empleado.nombre }}</h2>
                <p><ion-icon name="calendar-outline"></ion-icon>{{ pedido.fechaPedido | date:'dd/MM/yyyy' }}</p>
              </div>

              <div class="grid-boton">
                <ion-button fill="clear">
                  <ion-icon name="eye-outline"></ion-icon>
                </ion-button>

                <ion-button fill="clear">
                  <ion-icon name="create-outline"></ion-icon>
                </ion-button>

                <ion-button fill="clear">
                  <ion-icon name="trash-outline"></ion-icon>
                </ion-button>
              </div>
            </ion-card-content>

          </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

  <!-- contenedor de los pedidos en lista -->
  <div class="pedidos-list-container">
    <ion-list *ngIf="isChangeToogle">
      <ion-item *ngFor="let pedido of pedidos">
        <ion-label>
          <h2>{{pedido.idPedido}}</h2>
          <p>{{pedido.fechaPedido}}</p>
          <ion-chip>{{pedido.estado}}</ion-chip>
        </ion-label>
      </ion-item>
    </ion-list>
  </div>
</ion-content>
