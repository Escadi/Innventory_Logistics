<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Listado de clientes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <!--------------------------------------------------------------------------------------------------
    BARRA DE BUSQUEDA CON TOGGLER Y BOTON AGREGAR EN LA PARTE SUPERIOR
  ---------------------------------------------------------------------------------------------------->
  <div class="search-container">
    <ion-button>
      <ion-icon name="arrow-back"></ion-icon>
    </ion-button>
    <div class="search-bar">
      <ion-searchbar placeholder="DNI, Cif, Nombre o Telefono ...."></ion-searchbar>
      <ion-item lines="none">
        <ion-icon name="apps-outline"></ion-icon>
        <ion-toggle justify="end" [(ngModel)]="isChangeToogle">
        </ion-toggle>
        <ion-icon name="reorder-four-outline"></ion-icon>
      </ion-item>
    </div>
  </div>

  <!--------------------------------------------------------------------------------------------------
    TABLA DE CLIENTES EN FORMATO DE CARDS 
    ---------------------------------------------------------------------------------------------------->
  <div class="table-container" *ngIf="!isChangeToogle">
    <ion-grid>
      <ion-row>
        <ion-col size="12" size-md="5" size-lg="3" *ngFor="let client of clientes">
          <ion-card class="worker-card">
            <ion-card-header>
              <ion-card-title>
                <div class="cliente-info">
                  <h2>
                    <ion-icon name="id-card-outline"></ion-icon>
                    {{ client.cifCliente }}
                  </h2>
                  <h3>
                    <ion-icon name="person-outline"></ion-icon>
                    {{ client.nombre }}
                  </h3>
                </div>
              </ion-card-title>
            </ion-card-header>
            <ion-card-content>
              <div class="cliente-detalles">
                <p>
                  <ion-icon name="call-outline"></ion-icon>
                  {{ client.telefono }}
                </p>
                <p>
                  <ion-icon name="mail-open-outline"></ion-icon>
                  {{ client.correo }}
                </p>
                <p>
                  <ion-icon name="location-outline"></ion-icon>
                  {{ client.direccion }}
                </p>
                <p>
                  <ion-icon name="map-outline"></ion-icon>
                  {{ client.ciudad }}, {{ client.pais }}
                </p>
                <ion-chip>
                  <ion-icon name="create-outline"></ion-icon>
                  Editar
                </ion-chip>
              </div>
            </ion-card-content>
          </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

  <!--------------------------------------------------------------------------------------------------
    TABLA DE CLIENTES EN FORMATO DE LISTA
    ---------------------------------------------------------------------------------------------------->
  <div>
    <ion-list *ngIf="isChangeToogle" class="list-container">
      <ion-item *ngFor="let client of clientes" class="cliente-info-list" lines="full">
        <ion-avatar>
          <img alt="Client" src="https://ionicframework.com/docs/img/demos/avatar.svg" />
        </ion-avatar>
        <div class="cliente-infoHeader-list">
          <h2><ion-icon name="id-card-outline"></ion-icon>{{ client.cifCliente }}</h2>
          <h3>{{ client.nombre }}</h3>
        </div>
        <ion-label class="cliente-detalles-list">
          <p>
            <ion-icon name="call-outline"></ion-icon>
            {{ client.telefono }}
          </p>
          <p>
            <ion-icon name="mail-open-outline"></ion-icon>
            {{ client.correo }}
          </p>
          <p>
            <ion-icon name="location-outline"></ion-icon>
            {{ client.direccion }}
          </p>
        </ion-label>
        <div class="botones-lista">
          <ion-button slot="end" fill="clear">
            <ion-icon name="create-outline"></ion-icon>
          </ion-button>
        </div>
      </ion-item>
    </ion-list>
  </div>
</ion-content>
