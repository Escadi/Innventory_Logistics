<ion-content [fullscreen]="true">
  <ion-content [fullscreen]="true">
    <div class="search-container">
      <!------------------------------------------------------------------------------------------------
    FILTROS DE CATEGORIAS REALIZADO CON SEGMENTOS DE IONIC PARA HACER UNA BUSQUEDA MAS RAPIDA DE LAS 
    CATEGORIAS DE LOS PRODUCTOS
    -------------------------------------------------------------------------------------------------->
      <div class="segmentFilter">
        <ion-segment *ngFor="let category of selectedCategory" value="todos">
          <ion-segment-button value="{{ category.valor }}">
            <ion-label>{{ category.nombre }}</ion-label>
          </ion-segment-button>
        </ion-segment>
      </div>
      <!------------------------------------------------------------------------------------------------
    BARRA DE BUSQUEDA PARA BUSCAR POR CIF, NOMBRE, EMAIL, TELEFONO, ETC
    -------------------------------------------------------------------------------------------------->
      <div class="search-bar">
        <ion-searchbar placeholder="CIF, Nombre, Email, Telefono,.........."></ion-searchbar>
      </div>
    </div>
    <!------------------------------------------------------------------------------------------------
    LISTA DE PROVEEDORES
    -------------------------------------------------------------------------------------------------->
    <ion-grid class="listContainer">
      <ion-row>
        <ion-col size="12" size-md="6" size-lg="4" *ngFor="let provider of providers">
          <ion-item>
            <ion-label class="product-info">
              <h2>CIF: {{provider.id }}</h2>
              <p><span>Nombre:</span> {{ provider.name }}</p>
              <p><span>Email:</span> {{ provider.email }}</p>
              <p><span>Telefono:</span> {{ provider.phone }}</p>
              <p><span>Direccion:</span> {{ provider.address }}</p>
              <p><span>Ciudad:</span> {{ provider.city }}</p>
            </ion-label>
            <ion-button>
              <ion-icon name="mail-outline"></ion-icon>
            </ion-button>
            <ion-button>
              <ion-icon name="call-outline"></ion-icon>
            </ion-button>
          </ion-item>
        </ion-col>
      </ion-row>
    </ion-grid>
  </ion-content>
