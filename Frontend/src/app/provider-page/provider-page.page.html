<ion-content [fullscreen]="true">
  <ion-content [fullscreen]="true">
    <div class="search-container">
      <ion-segment value="todos">
        <ion-segment-button value="todos">
          <ion-label>Todos</ion-label>
        </ion-segment-button>
        <ion-segment-button value="papeleria">
          <ion-label>Papeleria</ion-label>
        </ion-segment-button>
        <ion-segment-button value="limpieza">
          <ion-label>Limpieza</ion-label>
        </ion-segment-button>
        <ion-segment-button value="alimentacion">
          <ion-label>Alimentacion</ion-label>
        </ion-segment-button>
        <ion-segment-button value="merchandising">
          <ion-label>Merchandising</ion-label>
        </ion-segment-button>
      </ion-segment>
      <div class="search-bar">
        <ion-searchbar placeholder="CIF, Nombre, Email, Telefono,.........."></ion-searchbar>
      </div>
    </div>
    <ion-grid class="listContainer">
      <ion-row>
        <ion-col size="12" size-md="6" size-lg="4" *ngFor="let provider of providers">
          <ion-item>
            <ion-label>
              <h2>{{provider.id }}</h2>
              <p>{{ provider.name }}</p>
              <p>{{ provider.email }}</p>
              <p>{{ provider.phone }}</p>
              <p>{{ provider.address }}</p>
              <p>{{ provider.city }}</p>
            </ion-label>
            <ion-button>
              <ion-icon name="mail-outline"></ion-icon>
            </ion-button>
            <ion-button>
              <ion-icon name="call-outline"></ion-icon>
            </ion-button>
          </ion-item>
        </ion-col>
      </ion-row>
    </ion-grid>
  </ion-content>
